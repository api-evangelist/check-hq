aid: check-hq
name: Check
description: >-
  Check is an embedded payroll infrastructure platform that allows vertical
  SaaS, HR, workforce management, and financial services companies to
  natively offer payroll inside their own products. Check provides a
  comprehensive REST API, a library of white-labeled React components
  (Check Components and Check Onboard), a CLI, and a Model Context
  Protocol (MCP) server that together cover company and employee
  onboarding, pay schedules, payroll preview and approval, contractor
  payments, tax calculation, multi-state withholdings, tax filings, tax
  deposits, money movement, paystubs, garnishments, post-tax deductions,
  net pay splits, benefits (health, 401k, workers' comp), W-2 and 1099
  generation, and webhook event delivery. Check operates in all 50 U.S.
  states plus D.C., has been incubated and led-funded by Stripe (Series B
  and Series C), and powers payroll for partners such as Homebase,
  ServiceTitan, 7shifts, Housecall Pro, Wave, Zoho, and Procare —
  collectively paying more than 1M employees across 35,000+ businesses
  and moving $15B+ annually.
type: Index
position: Provider
access: 3rd-Party
